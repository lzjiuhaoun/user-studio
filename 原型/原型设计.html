<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeTab 风格导航页</title>
    <!-- 引入 Tailwind CSS 进行样式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div 
      class="min-h-screen w-full relative flex flex-col items-center overflow-hidden font-sans text-white selection:bg-white/30"
      style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2064&auto=format&fit=crop'); background-size: cover; background-position: center;"
    >
      <!-- 动态背景遮罩，加深遮罩并增加模糊度以保证文字可读性 -->
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

      <!-- 顶部工具栏 -->
      <header class="w-full p-6 flex justify-between items-center z-10">
        <div class="flex items-center space-x-2 bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/20 hover:bg-white/20 transition cursor-pointer">
          <i data-lucide="plus" class="w-[18px] h-[18px]"></i>
          <span class="text-sm font-medium">添加组件</span>
        </div>
        <div class="flex items-center space-x-4">
          <button class="p-2 bg-white/10 backdrop-blur-md rounded-full border border-white/20 hover:bg-white/20 transition">
            <i data-lucide="maximize" class="w-[18px] h-[18px]"></i>
          </button>
          <button class="p-2 bg-white/10 backdrop-blur-md rounded-full border border-white/20 hover:bg-white/20 transition">
            <i data-lucide="settings" class="w-[18px] h-[18px]"></i>
          </button>
        </div>
      </header>

      <!-- 主体内容 -->
      <main class="flex-1 w-full max-w-5xl flex flex-col items-center justify-center z-10 px-4 pb-12">
        
        <!-- 时间显示 -->
        <div class="text-center mb-8 drop-shadow-2xl cursor-default select-none hover:scale-105 transition-transform duration-500">
          <h1 id="clock-time" class="text-7xl md:text-9xl font-bold tracking-wider font-mono">
            00:00
          </h1>
          <p id="clock-date" class="text-lg md:text-xl font-medium mt-4 text-white/90 tracking-wide">
            加载中...
          </p>
        </div>

        <!-- 搜索栏 -->
        <form id="search-form" class="w-full max-w-2xl mb-12 relative group">
          <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
            <i data-lucide="search" class="text-white/70 group-hover:text-white transition-colors w-[22px] h-[22px]"></i>
          </div>
          <input
            type="text"
            id="search-input"
            placeholder="搜索你想知道的..."
            class="w-full bg-white/10 hover:bg-white/20 focus:bg-white/20 backdrop-blur-md border border-white/20 text-white placeholder-white/60 rounded-full py-4 pl-14 pr-6 text-lg outline-none shadow-lg transition-all duration-300 focus:shadow-2xl focus:ring-2 focus:ring-white/30"
          />
        </form>

        <!-- 常用网站与小组件网格 (仿 WeTab 布局) -->
        <div class="w-full grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-6">
          
          <!-- 天气小组件 (2x2) -->
          <div class="col-span-2 row-span-2 bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-6 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between group cursor-pointer">
            <div class="flex justify-between items-start">
              <div>
                <div class="flex items-center space-x-1 text-white/80">
                  <i data-lucide="map-pin" class="w-4 h-4"></i>
                  <span class="text-sm">北京市</span>
                </div>
                <h2 class="text-4xl font-bold mt-2">24°</h2>
              </div>
              <i data-lucide="cloud-sun" class="w-12 h-12 text-yellow-400 drop-shadow-md group-hover:scale-110 transition-transform duration-500"></i>
            </div>
            <div class="space-y-1">
              <p class="text-lg font-medium">多云转晴</p>
              <div class="flex space-x-4 text-sm text-white/70">
                <span class="flex items-center"><i data-lucide="wind" class="w-3.5 h-3.5 mr-1"></i> 3级</span>
                <span class="flex items-center"><i data-lucide="droplets" class="w-3.5 h-3.5 mr-1"></i> 45%</span>
              </div>
            </div>
          </div>

          <!-- 待办事项小组件 (2x2) -->
          <div class="col-span-2 row-span-2 bg-gradient-to-br from-white/15 to-white/5 backdrop-blur-lg border border-white/20 rounded-3xl p-6 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col cursor-pointer">
            <h3 class="font-semibold text-lg flex items-center mb-4">
              <i data-lucide="check-circle-2" class="w-5 h-5 mr-2 text-green-400"></i>
              今日待办
            </h3>
            <ul class="space-y-3 flex-1">
              <li class="flex items-center text-sm bg-white/10 p-2 rounded-lg line-through text-white/50">
                <div class="w-4 h-4 rounded-full border border-white/30 bg-white/30 mr-3 flex-shrink-0"></div>
                完成产品原型设计
              </li>
              <li class="flex items-center text-sm bg-white/10 p-2 rounded-lg">
                <div class="w-4 h-4 rounded-full border border-white/50 mr-3 flex-shrink-0"></div>
                查阅 WeTab 参考资料
              </li>
              <li class="flex items-center text-sm bg-white/5 p-2 rounded-lg">
                <div class="w-4 h-4 rounded-full border border-white/50 mr-3 flex-shrink-0"></div>
                下班去超市买水果
              </li>
            </ul>
          </div>

          <!-- 快捷方式图标 (1x1) - Bilibili -->
          <a href="#" class="col-span-1 row-span-1 flex flex-col items-center justify-center group">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl md:rounded-3xl flex items-center justify-center shadow-lg group-hover:shadow-2xl group-hover:-translate-y-2 group-hover:bg-white/20 transition-all duration-300">
              <i data-lucide="monitor-play" class="w-8 h-8 text-pink-400 drop-shadow-md group-hover:scale-110 transition-transform duration-300"></i>
            </div>
            <span class="mt-2 text-xs md:text-sm font-medium text-white/80 group-hover:text-white transition-colors drop-shadow-md">Bilibili</span>
          </a>

          <!-- GitHub -->
          <a href="#" class="col-span-1 row-span-1 flex flex-col items-center justify-center group">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl md:rounded-3xl flex items-center justify-center shadow-lg group-hover:shadow-2xl group-hover:-translate-y-2 group-hover:bg-white/20 transition-all duration-300">
              <i data-lucide="github" class="w-8 h-8 text-gray-100 drop-shadow-md group-hover:scale-110 transition-transform duration-300"></i>
            </div>
            <span class="mt-2 text-xs md:text-sm font-medium text-white/80 group-hover:text-white transition-colors drop-shadow-md">GitHub</span>
          </a>

          <!-- YouTube -->
          <a href="#" class="col-span-1 row-span-1 flex flex-col items-center justify-center group">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl md:rounded-3xl flex items-center justify-center shadow-lg group-hover:shadow-2xl group-hover:-translate-y-2 group-hover:bg-white/20 transition-all duration-300">
              <i data-lucide="youtube" class="w-8 h-8 text-red-500 drop-shadow-md group-hover:scale-110 transition-transform duration-300"></i>
            </div>
            <span class="mt-2 text-xs md:text-sm font-medium text-white/80 group-hover:text-white transition-colors drop-shadow-md">YouTube</span>
          </a>

          <!-- Twitter -->
          <a href="#" class="col-span-1 row-span-1 flex flex-col items-center justify-center group">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl md:rounded-3xl flex items-center justify-center shadow-lg group-hover:shadow-2xl group-hover:-translate-y-2 group-hover:bg-white/20 transition-all duration-300">
              <i data-lucide="twitter" class="w-8 h-8 text-blue-400 drop-shadow-md group-hover:scale-110 transition-transform duration-300"></i>
            </div>
            <span class="mt-2 text-xs md:text-sm font-medium text-white/80 group-hover:text-white transition-colors drop-shadow-md">Twitter</span>
          </a>

          <!-- Figma -->
          <a href="#" class="col-span-1 row-span-1 flex flex-col items-center justify-center group">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl md:rounded-3xl flex items-center justify-center shadow-lg group-hover:shadow-2xl group-hover:-translate-y-2 group-hover:bg-white/20 transition-all duration-300">
              <i data-lucide="figma" class="w-8 h-8 text-purple-400 drop-shadow-md group-hover:scale-110 transition-transform duration-300"></i>
            </div>
            <span class="mt-2 text-xs md:text-sm font-medium text-white/80 group-hover:text-white transition-colors drop-shadow-md">Figma</span>
          </a>

          <!-- Dribbble -->
          <a href="#" class="col-span-1 row-span-1 flex flex-col items-center justify-center group">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl md:rounded-3xl flex items-center justify-center shadow-lg group-hover:shadow-2xl group-hover:-translate-y-2 group-hover:bg-white/20 transition-all duration-300">
              <i data-lucide="dribbble" class="w-8 h-8 text-pink-500 drop-shadow-md group-hover:scale-110 transition-transform duration-300"></i>
            </div>
            <span class="mt-2 text-xs md:text-sm font-medium text-white/80 group-hover:text-white transition-colors drop-shadow-md">Dribbble</span>
          </a>

          <!-- 添加按钮 (1x1) -->
          <div class="col-span-1 row-span-1 flex flex-col items-center justify-center group cursor-pointer">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-white/5 backdrop-blur-md border border-white/10 border-dashed rounded-2xl md:rounded-3xl flex items-center justify-center shadow-lg group-hover:-translate-y-2 group-hover:border-white/40 transition-all duration-300">
              <i data-lucide="plus" class="w-8 h-8 text-white/50 group-hover:text-white group-hover:rotate-90 transition-all duration-300"></i>
            </div>
            <span class="mt-2 text-xs md:text-sm font-medium text-white/50 group-hover:text-white transition-colors">添加</span>
          </div>

        </div>
      </main>

      <!-- 底部名言/一言 -->
      <footer class="absolute bottom-6 w-full text-center z-10 px-4">
        <p class="text-white/60 text-sm font-light hover:text-white/90 transition-colors cursor-pointer tracking-wide">
          " 预测未来的最好方式就是去创造它。"
        </p>
      </footer>
    </div>

    <script>
        // 1. 初始化 Lucide 图标
        lucide.createIcons();

        // 2. 实时时钟更新逻辑
        function updateTime() {
            const now = new Date();
            
            // 格式化时间 00:00
            const timeString = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                hour12: false 
            });
            document.getElementById('clock-time').textContent = timeString;

            // 格式化日期 
            const dateOptions = { month: 'long', day: 'numeric', weekday: 'long' };
            const dateString = now.toLocaleDateString('zh-CN', dateOptions);
            document.getElementById('clock-date').textContent = dateString;
        }

        // 初始化时间并设置定时器
        updateTime();
        setInterval(updateTime, 1000);

        // 3. 搜索栏跳转逻辑
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');

        searchForm.addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止表单默认提交行为
            const query = searchInput.value.trim();
            if (query) {
                // 跳转到必应搜索
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(query)}`, '_blank');
            }
        });
    </script>
</body>
</html>
